<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>G2 Apartments</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #020617;
      --bg-soft: #0b1120;
      --card: rgba(255, 255, 255, 0.05);
      --text: #f9fafb;
      --muted: #9ca3af;
      --accent: #c6a96b;
      --border: rgba(255,255,255,0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top, #111827, #020617);
      color: var(--text);
    }

    .container {
      max-width: 1200px;
      margin: auto;
      padding: 60px 20px;
    }

    /* HERO */
    .hero {
      text-align: center;
      margin-bottom: 60px;
    }

    .brand {
      font-size: 12px;
      letter-spacing: 3px;
      color: var(--accent);
      margin-bottom: 10px;
    }

    .hero h1 {
      font-size: 42px;
      line-height: 1.2;
      margin-bottom: 12px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 16px;
      max-width: 600px;
      margin: auto;
    }

    /* GRID */
    .cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 30px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      backdrop-filter: blur(12px);
      transition: all 0.3s ease;
    }

    .card:hover {
      transform: translateY(-8px);
      border-color: rgba(198,169,107,0.4);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .card-content {
      padding: 20px;
    }

    .card h2 {
      font-size: 20px;
      margin-bottom: 6px;
    }

    .location {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .btn {
      display: inline-block;
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid var(--accent);
      color: var(--accent);
      text-decoration: none;
      font-size: 13px;
      transition: all 0.25s ease;
    }

    .btn:hover {
      background: var(--accent);
      color: #000;
    }

    footer {
      text-align: center;
      margin-top: 80px;
      font-size: 12px;
      color: var(--muted);
    }

    /* ========================= */
    /* 📱 MOBILE (≤ 640px) */
    /* ========================= */
    @media (max-width: 640px) {
      .container {
        padding: 40px 16px;
      }

      .hero h1 {
        font-size: 28px;
      }

      .subtitle {
        font-size: 14px;
      }

      .cards {
        grid-template-columns: 1fr;
        gap: 20px;
      }

      .card img {
        height: 180px;
      }
    }

    /* ========================= */
    /* 📲 TABLET (641px–1024px) */
    /* ========================= */
    @media (min-width: 641px) and (max-width: 1024px) {
      .hero h1 {
        font-size: 34px;
      }

      .cards {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    /* ========================= */
    /* 💻 SMALL LAPTOP (1025px–1440px) */
    /* ========================= */
    @media (min-width: 1025px) and (max-width: 1440px) {
      .hero h1 {
        font-size: 38px;
      }
    }

    /* ========================= */
    /* 🖥️ LARGE SCREENS (1441px+) */
    /* ========================= */
    @media (min-width: 1441px) {
      .container {
        max-width: 1400px;
      }

      .hero h1 {
        font-size: 48px;
      }

      .cards {
        gap: 40px;
      }

      .card img {
        height: 260px;
      }
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- HERO -->
    <div class="hero">
      <div class="brand">G2 COLLECTION</div>
      <h1>Luxury Short Stay Apartments</h1>
      <div class="subtitle">
        Curated spaces designed for comfort, elegance, and premium living.
      </div>
    </div>

    <!-- CARDS -->
    <div class="cards">

      <div class="card">
        <img src="Images/living-room.jpg" />
        <div class="card-content">
          <h2>G2 Luxe</h2>
          <div class="location">Victoria Island · 2 Bedroom</div>
          <a href="apt1.html" class="btn">View Apartment</a>
        </div>
      </div>

      <div class="card">
        <img src="Images/apt2/living-room.jpg" />
        <div class="card-content">
          <h2>G2 Residence</h2>
          <div class="location">Ikeja · Premium Stay</div>
          <a href="apt2.html" class="btn">View Apartment</a>
        </div>
      </div>

    </div>

    <footer>
      © 2026 G2 Apartments · All Rights Reserved
    </footer>

  </div>

</body>
</html>
